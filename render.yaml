# Render Blueprint — https://render.com/docs/blueprint-spec
# After pushing to GitHub: Render Dashboard → New → Blueprint → connect this repo.
services:
  - type: web
    name: aidulislamphotography
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      # React Router (BrowserRouter): serve index.html for client-side routes
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
